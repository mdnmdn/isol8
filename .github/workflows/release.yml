name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Validate tag and version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml
        run: bash _devops/scripts/version.sh verify "${{ github.ref_name }}"

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # - os: linux
          #   arch: arm64
          #   target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-24.04-arm
          # - os: macos
          #   arch: x64
          #   target: x86_64-apple-darwin
          #   runner: macos-latest
          - os: macos
            arch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          # - os: windows
          #   arch: x64
          #   target: x86_64-pc-windows-msvc
          #   runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          ISOL8_VERSION: ${{ github.ref_name }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/isol8 dist/
          cd dist
          zip ../${{ matrix.os }}-${{ matrix.arch }}.zip isol8
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.os }}-${{ matrix.arch }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml
        run: bash _devops/scripts/version.sh verify "${{ github.ref_name }}"

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ISOL8_VERSION: ${{ github.ref_name }}