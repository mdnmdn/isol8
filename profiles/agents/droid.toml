# agents/droid
# Agent: Droid Droid CLI binary, Factory helpers, state, and config paths.
# filter = { os = ["macos"] }  # macOS-only layer (filter not parsed yet)

filter = { executables = ["droid"] }

requires = ["macos/system-runtime"]

paths = [
  { path = "~/.local/bin/droid", access = "rw", match = "prefix" },
  { path = "~/.factory", access = "rw" },
]
