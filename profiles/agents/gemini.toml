# agents/gemini
# Agent: Gemini Gemini CLI binary, state, and config paths.
# filter = { os = ["macos"] }  # macOS-only layer (filter not parsed yet)

filter = { executables = ["gemini"] }

requires = ["integrations/keychain"]

paths = [
  { path = "~/.local/bin/gemini", access = "rw", match = "prefix" },
  { path = "~/.gemini", access = "rw" },
  { path = "~/.cache/gemini", access = "rw" },
  { path = "/Library/Application Support/GeminiCli", access = "ro" },
]
