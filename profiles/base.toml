# base — cross-platform minimal runtime layer (file stem = layer name "base").
#
# The lowest band (00): the smallest set of grants any confined command needs,
# regardless of OS. OS-specific runtime essentials live in higher layers
# (e.g. `macos-system`, which `requires = ["base"]`).
#
# Deny-by-default: this only grants ro on the standard binary/library trees,
# rw on the world-writable temp dir, a minimal PATH, and a scratch HOME.

paths = [
  # Read-only access to the standard system binary + library trees. `subpath`
  # (the default) covers the whole subtree.
  { path = "/usr", access = "ro" },
  { path = "/bin", access = "ro" },
  # The one writable location. Most tools expect a usable temp dir.
  { path = "/tmp", access = "rw" },
]

# Minimal PATH — folded as a default (first-writer-wins), so a host PATH on the
# allowlist still takes precedence per env merge semantics.
env = { PATH = "/usr/bin:/bin" }

# HOME is NOT replaced by default — `~`-relative grants target the real home so a
# command's own binary/config (e.g. ~/.local/bin/<agent>) stays reachable. Opt in
# to a per-session scratch HOME with `--home <dir>` or by enabling this in a layer:
#   home_replace = { enabled = true, auto_scratch = true, seed = ["~/.gitconfig"] }
