# integrations/1password
# Integration: 1Password 1Password desktop app and CLI agent socket access.
# filter = { os = ["macos"] }  # macOS-only layer (filter not parsed yet)

requires = ["macos/system-runtime"]

paths = [
  { path = "~/.config/1Password", access = "ro" },
]

[macos]
raw = '''
(allow file-read* file-write*
    (home-subpath "/.config/op")                               
    (home-subpath "/.1password")                               
    (subpath "/Users/Shared/.1password")                       
    (regex (string-append "^" HOME_DIR "/Library/Group Containers/[A-Za-z0-9]+\\.com\\.1password/t/agent\\.sock$")) 
)
(allow file-read*
    (regex (string-append "^" HOME_DIR "/Library/Group Containers/[A-Za-z0-9]+\\.com\\.1password/Library/Application Support/1Password/Data/settings(/.*)?$"))      
)
(allow mach-lookup
    (global-name-regex #"^([A-Za-z0-9]+\.)?com\.1password(\..*)?$")  ;; 1Password app/service IPC endpoints (including team-prefixed browser-helper names).
    (global-name-regex #"^com\.agilebits(\..*)?$")                    ;; Legacy AgileBits service names still used by some installs.
)
'''
