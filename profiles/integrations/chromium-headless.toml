# integrations/chromium-headless
# Integration: Chromium Headless AppKit, crashpad, GPU, and launch-service allowances needed by headless
# filter = { os = ["macos"] }  # macOS-only layer (filter not parsed yet)

requires = ["macos/system-runtime", "network"]

paths = [
  { path = "/private/var/db", access = "metadata", match = "literal" },
  { path = "/private/var/db/.AppleSetupDone", access = "metadata", match = "literal" },
  { path = "~/Library", access = "metadata", match = "literal" },
  { path = "~/Library/Application Support", access = "metadata", match = "literal" },
  { path = "~/Library/Caches", access = "metadata", match = "literal" },
  { path = "~/Library/Spelling", access = "metadata", match = "literal" },
  { path = "/private/etc", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.universalaccess.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.Accessibility.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.CoreGraphics.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.symbolichotkeys.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.ServicesMenu.Services.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.speech.recognition.AppleSpeechRecognition.prefs.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.SpeakSelection.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.assistant.support.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.assistant.backedup.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/pbs.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.HIToolbox.plist", access = "ro", match = "literal" },
  { path = "/Library/Preferences/com.apple.HIToolbox.plist", access = "ro", match = "literal" },
  { path = "~/Library/Preferences/com.apple.LaunchServices", access = "ro" },
  { path = "~/Library/Application Support/CrashReporter", access = "ro" },
  { path = "~/Library/Application Support/Google/Chrome/Crashpad", access = "ro" },
  { path = "~/Library/Spelling", access = "ro" },
  { path = "~/Library/Keyboard Layouts", access = "ro", match = "literal" },
  { path = "~/Library/Input Methods", access = "ro", match = "literal" },
  { path = "~/Library/Application Support/Google/Chrome/Crashpad", access = "rw" },
]

[macos]
raw = '''
(allow user-preference-read
    (preference-domain "com.apple.hitoolbox")
)
(allow mach-register
    (global-name-regex #"^org\.chromium\.Chromium\.MachPortRendezvousServer\.")
    (global-name-regex #"^org\.chromium\.crashpad\.child_port_handshake\.")
    (global-name-regex #"^com\.google\.Chrome\.MachPortRendezvousServer\.")     ;; Branded Google Chrome uses com.google.Chrome.* instead of org.chromium.Chromium.*
    (global-name-regex #"^com\.google\.Chrome\.crashpad\.child_port_handshake\.") ;; Branded Google Chrome crashpad handshake
    (local-name "com.apple.axserver")
    (local-name "com.apple.tsm.portname")
    (local-name "com.apple.coredrag")
)
(allow mach-lookup
    (global-name-regex #"^org\.chromium\.Chromium\.MachPortRendezvousServer\.")
    (global-name-regex #"^org\.chromium\.crashpad\.child_port_handshake\.")
    (global-name-regex #"^com\.google\.Chrome\.MachPortRendezvousServer\.")     ;; Branded Google Chrome
    (global-name-regex #"^com\.google\.Chrome\.crashpad\.child_port_handshake\.") ;; Branded Google Chrome crashpad
    (global-name "com.apple.MTLCompilerService")
    (global-name "com.apple.SafariPlatformSupport.Helper")
    (global-name "com.apple.CARenderServer")
    (global-name "com.apple.windowserver.active")
    (global-name "com.apple.windowmanager.server")
    (global-name "com.apple.window_proxies")
    (global-name "com.apple.dock.server")
    (global-name "com.apple.tccd")
    (global-name "com.apple.tccd.system")
    (global-name "com.apple.fonts")
    (global-name "com.apple.FontObjectsServer")
    (global-name "com.apple.lsd.mapdb")
    (global-name "com.apple.lsd.modifydb")
    (global-name "com.apple.iconservices")
    (global-name "com.apple.coreservices.appleevents")
    (global-name "com.apple.coreservices.sharedfilelistd.xpc")
    (global-name "com.apple.coreservices.quarantine-resolver")
    (global-name "com.apple.hiservices-xpcservice")
    (global-name "com.apple.iohideventsystem")
    (global-name "com.apple.tsm.uiserver")
    (global-name "com.apple.touchbarserver.mig")
    (global-name "com.apple.accessibility.voices")
    (global-name "com.apple.backboard.hid-services.xpc")
    (global-name "com.apple.backboard.BKSEndpointProviderService")
    (global-name "com.apple.TextInputUI.xpc.CursorUIViewService")
    (global-name "com.apple.inputmethodkit.launchagent")
    (global-name "com.apple.inputmethodkit.launcher")
    (global-name "com.apple.inputmethodkit.getxpcendpoint")
    (global-name "com.apple.ViewBridgeAuxiliary")
    (global-name "com.apple.appkit.restoration_storage")
    (global-name "com.apple.appkit.xpc.openAndSavePanelService")
    (global-name "com.apple.backgroundtaskmanagementagent")
    (global-name "com.apple.pbs.fetch_services")
    (global-name "com.apple.powerlog.plxpclogger.xpc")
    (global-name "com.apple.FileCoordination")
    (global-name "com.apple.security.syspolicy")
    (global-name "com.apple.security.syspolicy.exec")
    (global-name "com.apple.sidecar-relay")
    (global-name "com.apple.scopedbookmarksagent.xpc")
    (global-name "com.apple.xpc.smd")
    (global-name "com.apple.bsd.dirhelper")
    (global-name "com.apple.system.opendirectoryd.membership")
    (global-name "com.apple.logd.events")
    (global-name "com.apple.usernotifications.listener")
    (global-name "com.apple.audio.SystemSoundServer-OSX")
    (global-name "com.apple.audio.audiohald")
    (global-name "mul-xpc (Apple)_OpenStep")
    (global-name "com.apple.naturallanguaged")
    (global-name "com.apple.inputanalyticsd")
    (global-name-prefix "com.apple.distributed_notifications@")
)
(allow file-read-xattr file-write-xattr
    (home-subpath "/Library/Application Support/Google/Chrome/Crashpad")
)
(allow system-fsctl
    (fsctl-command (_IO "h" 47))
)
(allow iokit-open
    (iokit-user-client-class "RootDomainUserClient")
    (iokit-user-client-class "IOHIDParamUserClient")
    (iokit-user-client-class "AppleNVMeEANUC")
    (iokit-user-client-class "IOSurfaceRootUserClient")
    (iokit-user-client-class "AGXDeviceUserClient")
)
'''
