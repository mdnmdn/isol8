# integrations/cloud-credentials
# Integration: Cloud Credentials Cloud provider CLI/SDK credential, config, and cache access.
# filter = { os = ["macos"] }  # macOS-only layer (filter not parsed yet)

requires = ["macos/system-runtime"]

paths = [
  { path = "~/.aws", access = "rw" },
  { path = "~/.config/gcloud", access = "rw" },
  { path = "~/.azure", access = "rw" },
  { path = "~/.azd", access = "rw" },
]
