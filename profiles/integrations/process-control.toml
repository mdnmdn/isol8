requires = ["macos/system-runtime"]

[macos]
capabilities = ["signal"]
raw = '''
(allow mach-lookup
    (global-name "com.apple.sysmond")  
)
;; shell process-control helpers (not SBPL): kill, pkill, kill -0
'''
