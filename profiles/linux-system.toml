# linux-system — Linux runtime essentials layer (file stem = layer name).
#
# Builds on `base` (which already grants ro /usr, /bin, and rw /tmp). Adds
# the Linux-specific grants needed for basic commands to run under Landlock.
#
# Unlike macOS's Seatbelt, Landlock does not need explicit process-exec or
# process-fork capabilities — those are always allowed. The main additions
# are filesystem paths that Linux binaries need for dynamic linking and
# runtime state.

requires = ["base"]

paths = [
  # Dynamic linker and shared libraries.
  { path = "/lib", access = "ro" },
  { path = "/lib64", access = "ro" },
  { path = "/usr/lib", access = "ro" },
  { path = "/usr/lib64", access = "ro" },

  # /etc for system configs (passwd, nss, ssl certs, locale).
  { path = "/etc", access = "ro" },

  # /dev/null, /dev/urandom, /dev/zero — standard POSIX devices.
  { path = "/dev", access = "ro" },

  # /proc for basic process info ( getpid, etc.).
  { path = "/proc", access = "ro" },

  # /var for /var/tmp (a second writable temp area) and /var/cache.
  { path = "/var/tmp", access = "rw" },
  { path = "/var/cache", access = "rw" },

  # /run for user runtime dir (XDG_RUNTIME_DIR).
  { path = "/run/user", access = "rw" },

  # Root itself (stat for path resolution).
  { path = "/", access = "ro", match = "literal" },
]
