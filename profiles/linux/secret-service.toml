# linux/secret-service — Linux credential store (replaces macOS keychain layer).
#
# GNOME Keyring / libsecret via ~/.local/share/keyrings and the session socket
# under XDG_RUNTIME_DIR (/run/user, granted by linux/system-runtime).

requires = ["linux/system-runtime"]

filter = { os = ["linux"] }

paths = [
  { path = "~/.local/share/keyrings", access = "rw" },
]