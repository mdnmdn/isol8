# toolchains/node
# Toolchain: Node.js Node.js runtime with npm, yarn, pnpm, and corepack package manager paths.
# filter = { os = ["macos"] }  # macOS-only layer (filter not parsed yet)

requires = ["macos/system-runtime"]

paths = [
  { path = "~/.nvm", access = "rw" },
  { path = "~/.fnm", access = "rw" },
  { path = "~/.local/share/fnm", access = "rw" },
  { path = "~/Library/Application Support/fnm", access = "rw" },
  { path = "~/.npm", access = "rw" },
  { path = "~/.config/npm", access = "rw" },
  { path = "~/.cache/npm", access = "rw" },
  { path = "~/.cache/node", access = "rw" },
  { path = "~/.cache/prisma", access = "rw" },
  { path = "~/Library/Caches/npm", access = "rw" },
  { path = "~/.npmrc", access = "rw", match = "literal" },
  { path = "~/.config/configstore", access = "rw" },
  { path = "~/.node-gyp", access = "rw" },
  { path = "~/.cache/node-gyp", access = "rw" },
  { path = "~/.config/pnpm", access = "rw" },
  { path = "~/.pnpm-state", access = "rw" },
  { path = "~/.pnpm-store", access = "rw" },
  { path = "~/.local/share/pnpm", access = "rw" },
  { path = "~/.local/state/pnpm", access = "rw" },
  { path = "~/Library/pnpm", access = "rw" },
  { path = "~/Library/Caches/pnpm", access = "rw" },
  { path = "~/Library/Preferences/pnpm", access = "rw" },
  { path = "~/.yarn", access = "rw" },
  { path = "~/.yarnrc", access = "rw", match = "literal" },
  { path = "~/.yarnrc.yml", access = "rw", match = "literal" },
  { path = "~/.config/yarn", access = "rw" },
  { path = "~/.cache/yarn", access = "rw" },
  { path = "~/Library/Caches/Yarn", access = "rw" },
  { path = "~/.cache/node/corepack", access = "rw" },
  { path = "~/Library/Caches/node/corepack", access = "rw" },
  { path = "~/Library/Caches/ms-playwright", access = "rw" },
  { path = "~/Library/Caches/Cypress", access = "rw" },
  { path = "~/.cache/puppeteer", access = "rw" },
  { path = "~/Library/Caches/typescript", access = "rw" },
  { path = "~/Library/Caches/prisma-nodejs", access = "rw" },
  { path = "~/Library/Caches/checkpoint-nodejs", access = "rw" },
  { path = "~/Library/Caches/claude-cli-nodejs", access = "rw" },
  { path = "~/.cache/turbo", access = "rw" },
  { path = "~/Library/Caches/turbo", access = "rw" },
  { path = "~/Library/Application Support/turborepo", access = "rw" },
  { path = "~/.local/state", access = "metadata", match = "literal" },
  { path = "~/.local/state/fnm_multishells", access = "metadata" },
  { path = "~/Library/Application Support", access = "metadata", match = "literal" },
]
